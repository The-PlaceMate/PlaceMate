project_id = "placemate"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1:54321"

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = [
  "http://localhost:5173",
  "http://localhost:5173/register",
  "http://localhost:5173/register/success",
  "http://localhost:5173/register/error",
  "http://localhost:5173/register-institute",
]
jwt_expiry = 3600
enable_signup = true

[storage]
enabled = true
file_size_limit = "50MiB"

[edge_runtime]
enabled = true
policy = "oneshot"

[functions.create-admin-invitation]
verify_jwt = false

[functions.validate-admin-invitation]
verify_jwt = false

[functions.complete-admin-registration]
verify_jwt = false
